<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>
    <link rel="icon" type="image/png" href="/img/icon/chessicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/devPage.css">
</head>
<body>
    <header>
        <button class="back-btn" id="back-btn">
            &lt; Back
        </button>
        <h1 class="page-title">About</h1>
    </header>

    <main>
        <div class="hero">
            <img src="/img/pic/chessImg.png" id="chess" alt="Chess" oncontextmenu="return false;" draggable="false">
            <h2>Chess Online</h2>
            <p>A real-time multiplayer chess game.</p>
        </div>
        <div class="team">
            <h3>Contributors</h3>
            <ul>
                <li id="first-pers">
                    <i class="fas fa-code-branch"></i>
                    <span>Arnaud</span>
                    <i class="fas fa-external-link-alt link-icon"></i>
                </li>
                <li id="second-pers">
                    <i class="fas fa-code-branch"></i>
                    <span>Nathan</span>
                    <i class="fas fa-external-link-alt link-icon"></i>
                </li>
            </ul>
        </div>
    </main>

    <script>
        document.getElementById('back-btn').addEventListener('click', function() {
            window.location.href = '/index.html';
        });
        document.getElementById('first-pers').addEventListener('click', function() {
            window.open('https://github.com/Arnaudvitale', '_blank');
        });
        document.getElementById('second-pers').addEventListener('click', function() {
            window.open('https://github.com/Nathn', '_blank');
        });
        window.history.replaceState(null, null, '/about');
    </script>
</body>
</html>
