<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chess — Lobby</title>
    <link rel="icon" type="image/png" href="/img/icon/chessicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/css/lobby.css">
</head>
<body>
    <header>
        <div id="user">
            <span id="username"></span>
            <span id="elo-display">ELO <span id="elo"></span></span>
        </div>
        <h1><i class="fas fa-chess"></i> Chess Lobby</h1>
        <button id="logout-btn"><i class="fas fa-right-from-bracket"></i> Logout</button>
    </header>

    <main>
        <div class="lobby-top">
            <h2>Active Games</h2>
            <button id="create-game-btn">
                <i class="fas fa-plus"></i> New Game
            </button>
        </div>

        <div id="games-list"></div>
        <div id="no-games">
            <i class="fas fa-chess-board"></i>
            <p>No active games.</p>
            <p id="no-games-hint">Create one to start playing!</p>
        </div>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/lobby.js"></script>
    <script>window.history.replaceState(null, null, '/lobby');</script>
</body>
</html>
