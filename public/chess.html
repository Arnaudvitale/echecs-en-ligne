<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess</title>
    <link rel="icon" type="image/png" href="/img/icon/chessicon.png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
</head>
<body>
    <header>
        <div id="user">
            <span id="username"></span>
            <span id="elo-display">ELO <span id="elo"></span></span>
        </div>
        <h1><span id="game-name">Chess</span></h1>
        <div id="logged-in">
            <button id="lang-toggle" onclick="toggleLang()" style="background:rgba(99,102,241,0.1);color:#6366f1;border:1px solid rgba(99,102,241,0.25);border-radius:8px;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer;margin-right:6px;">EN</button>
            <button id="lobby-btn" style="background:rgba(99,102,241,0.1);color:#6366f1;border:1px solid rgba(99,102,241,0.25);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;margin-right:8px;transition:background 0.2s;" onmouseover="this.style.background='rgba(99,102,241,0.2)'" onmouseout="this.style.background='rgba(99,102,241,0.1)'">
                &lt; Lobby
            </button>
            <button id="logout-btn">
                <i class="fas fa-right-from-bracket"></i> <span data-i18n="logout">Logout</span>
            </button>
        </div>
    </header>

    <div id="container">
        <!-- Left: Teams + History -->
        <div class="item team-container">
            <h2 data-i18n="choose-team">Choose Team</h2>
            <button id="white-team-btn" class="team-btn">
                <i class="fas fa-chess-king"></i> <span data-i18n="white">White</span>
            </button>
            <button id="black-team-btn" class="team-btn">
                <i class="fas fa-chess-king"></i> <span data-i18n="black">Black</span>
            </button>
            <button id="restart-btn" style="display:none;margin-top:8px;">
                <i class="fas fa-rotate-right"></i>
                <span><span id="two-players" data-i18n="request">Request </span><span data-i18n="restart">Restart</span></span>
            </button>
            <div id="move-history">
                <h2 data-i18n="move-history">Move History</h2>
                <div id="movesHistoryContainer">
                    <ul id="movesHistory"></ul>
                </div>
            </div>
        </div>

        <!-- Center: Board -->
        <div class="item board-col">
            <div id="status"></div>
            <div id="myBoard"></div>
        </div>

        <!-- Right: Chat -->
        <div class="item chat-col">
            <h2><i class="fas fa-comments"></i> <span data-i18n="chat-title">Chat</span></h2>
            <div id="chat">
                <ul id="messages"></ul>
                <form id="form">
                    <input id="input" autocomplete="off" maxlength="150" data-i18n-ph="message-ph" placeholder="Message…" />
                    <button id="send-btn" type="submit" aria-label="Send">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/i18n.js"></script>
    <script src="/js/chess-state.js"></script>
    <script src="/js/chess-utils.js"></script>
    <script src="/js/chess-board.js"></script>
    <script src="/js/chess-socket.js"></script>
    <script src="/js/chess-chat.js"></script>
    <script src="/js/chess-init.js"></script>
    <script>
        window.history.replaceState(null, null, "/chess");
    </script>
</body>
</html>
