<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess — Login</title>
    <link rel="icon" type="image/png" href="../img/icon/chessicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/pc/loginpc.css">
</head>
<body>
    <button class="about-btn" id="dev-link" data-i18n="about">About</button>
    <img id="lang-toggle" onclick="toggleLang()" src="https://flagcdn.com/fr.svg" alt="FR" style="position:fixed;top:16px;right:104px;width:30px;height:21px;border-radius:3px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,0.15);object-fit:cover;z-index:1000;">

    <div class="container" id="container">
        <!-- Sign In -->
        <div class="form-container sign-in-container">
            <form id="login-form" novalidate>
                <h1 data-i18n="sign-in-tab">Sign In</h1>
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="username" data-i18n-ph="username-ph" placeholder="Username" autocomplete="username" required />
                </div>
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" data-i18n-ph="password-ph" placeholder="Password" autocomplete="current-password" required />
                    <button type="button" class="toggle-pwd" aria-label="Toggle password">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                </div>
                <button type="submit" class="btn-primary" data-i18n="sign-in-btn">Sign In</button>
            </form>
        </div>

        <!-- Sign Up -->
        <div class="form-container sign-up-container">
            <form id="register-form" novalidate>
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="reg-username" data-i18n-ph="username-ph" placeholder="Username" autocomplete="username" required />
                </div>
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="reg-password" data-i18n-ph="password-ph" placeholder="Password" autocomplete="new-password" required />
                    <button type="button" class="toggle-pwd" aria-label="Toggle password">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                </div>
                <button type="submit" class="btn-primary" data-i18n="register-btn">Register</button>
            </form>
        </div>

        <!-- Overlay -->
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <div class="overlay-icon"><i class="fas fa-chess-queen"></i></div>
                    <h1 data-i18n="welcome-back-h">Welcome Back</h1>
                    <p data-i18n="welcome-back-p">Already have an account?<br>Sign in and play.</p>
                    <button class="btn-ghost" id="signIn" data-i18n="sign-in-tab">Sign In</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <div class="overlay-icon"><i class="fas fa-chess-pawn"></i></div>
                    <h1 data-i18n="join-game-h">Join the Game</h1>
                    <p data-i18n="join-game-p">No account yet?<br>Create one and start playing.</p>
                    <button class="btn-ghost" id="signUp" data-i18n="register-tab">Register</button>
                </div>
            </div>
        </div>
    </div>

    <div class="guest-fixed">
        <button id="guest-btn" class="btn-guest">
            <i class="fas fa-user-secret"></i> <span data-i18n="guest-btn">Continue as Guest</span>
        </button>
    </div>

    <script src="/js/i18n.js"></script>
    <script src="/pc/loginpc.js"></script>
    <script>
        window.history.replaceState(null, null, '/login');
    </script>
</body>
</html>
