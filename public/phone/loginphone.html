<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chess — Login</title>
    <link rel="icon" type="image/png" href="../img/icon/chessicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/phone/loginphone.css">
</head>
<body>
    <button class="about-btn" id="dev-link" data-i18n="about">About</button>
    <button id="lang-toggle" onclick="toggleLang()" style="position:fixed;top:14px;right:80px;background:rgba(99,102,241,0.1);color:#6366f1;border:1px solid rgba(99,102,241,0.25);border-radius:6px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;z-index:100;">EN</button>

    <div class="auth-card" id="container">
        <!-- Tabs -->
        <div class="tab-bar">
            <button class="tab active" data-target="sign-in" data-i18n="sign-in-tab">Sign In</button>
            <button class="tab" data-target="sign-up" data-i18n="register-tab">Register</button>
        </div>

        <!-- Sign In -->
        <div class="form-panel sign-in-container" id="sign-in">
            <form id="login-form" novalidate>
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="username" data-i18n-ph="username-ph" placeholder="Username" autocomplete="username" required />
                </div>
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" data-i18n-ph="password-ph" placeholder="Password" autocomplete="current-password" required />
                    <button type="button" class="toggle-pwd" aria-label="Toggle password">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                </div>
                <button type="submit" class="btn-primary" data-i18n="sign-in-btn">Sign In</button>
            </form>
        </div>

        <!-- Sign Up -->
        <div class="form-panel sign-up-container" id="sign-up" style="display:none">
            <form id="register-form" novalidate>
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="reg-username" data-i18n-ph="username-ph" placeholder="Username" autocomplete="username" required />
                </div>
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="reg-password" data-i18n-ph="password-ph" placeholder="Password" autocomplete="new-password" required />
                    <button type="button" class="toggle-pwd" aria-label="Toggle password">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                </div>
                <button type="submit" class="btn-primary" data-i18n="create-account-btn">Create Account</button>
            </form>
        </div>

        <div class="guest-row">
            <button id="guest-btn" class="btn-guest">
                <i class="fas fa-user-secret"></i> <span data-i18n="guest-btn">Continue as Guest</span>
            </button>
        </div>
    </div>

    <script src="/js/i18n.js"></script>
    <script src="/phone/loginphone.js"></script>
    <script>
        window.history.replaceState(null, null, '/login-page');
    </script>
</body>
</html>
