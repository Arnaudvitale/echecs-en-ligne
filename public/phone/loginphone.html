<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Chess — Login</title>
    <link rel="icon" type="image/png" href="../img/icon/chessicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/phone/loginphone.css">
</head>
<body>
    <button class="about-btn" id="dev-link">About</button>

    <div class="auth-card" id="container">
        <!-- Tabs -->
        <div class="tab-bar">
            <button class="tab active" data-target="sign-in">Sign In</button>
            <button class="tab" data-target="sign-up">Register</button>
        </div>

        <!-- Sign In -->
        <div class="form-panel sign-in-container" id="sign-in">
            <form id="login-form" novalidate>
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="username" placeholder="Username" autocomplete="username" required />
                </div>
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" placeholder="Password" autocomplete="current-password" required />
                    <button type="button" class="toggle-pwd" aria-label="Toggle password">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
        </div>

        <!-- Sign Up -->
        <div class="form-panel sign-up-container" id="sign-up" style="display:none">
            <form id="register-form" novalidate>
                <div class="input-group">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="reg-username" placeholder="Username" autocomplete="username" required />
                </div>
                <div class="input-group">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="reg-password" placeholder="Password" autocomplete="new-password" required />
                    <button type="button" class="toggle-pwd" aria-label="Toggle password">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                </div>
                <button type="submit" class="btn-primary">Create Account</button>
            </form>
        </div>

        <div class="guest-row">
            <button id="guest-btn" class="btn-guest">
                <i class="fas fa-user-secret"></i> Continue as Guest
            </button>
        </div>
    </div>

    <script src="/phone/loginphone.js"></script>
    <script>
        window.history.replaceState(null, null, '/login-page');
    </script>
</body>
</html>
